services:
  postgres:
    image: postgres:16
    container_name: ai_interview_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_interview}
      POSTGRES_USER: ${POSTGRES_USER:-ai_interview}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_interview}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ai_interview_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-56379}:6379"

volumes:
  postgres_data:
